<h1>Comando DU</h1>

<p>El comando du muestra el tamaño de archivos y carpetas.</p>

<h2>Opciones</h2>
<ul>
    <li>-h: Tamaño legible</li>
    <li>-s: Resumen total</li>
</ul>

<h2>Ejemplo</h2>
<p>du -sh carpeta</p>
